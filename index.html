<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web 应用导航面板</title>
  <link rel="stylesheet" href="styles.css?v=41" />
</head>
<body>
  <!-- 登录 / 注册 -->
  <div id="authView" class="auth-view">
    <div class="auth-card">
      <div class="auth-logo">🚀</div>
      <h1>Web 应用导航</h1>
      <p class="auth-sub" id="authSub">登录以同步你的应用</p>

      <form id="loginForm" class="auth-form">
        <input id="loginUser" type="text" placeholder="用户名" autocomplete="username" required />
        <input id="loginPass" type="password" placeholder="密码" autocomplete="current-password" required />
        <button class="btn primary block" type="submit">登录</button>
        <p class="auth-toggle">还没有账号？<a id="toRegister" href="#">注册一个</a></p>
      </form>

      <form id="registerForm" class="auth-form" hidden>
        <input id="regUser" type="text" placeholder="用户名（3-32 位）" autocomplete="username" required />
        <input id="regPass" type="password" placeholder="密码（至少 6 位）" autocomplete="new-password" required />
        <button class="btn primary block" type="submit">注册</button>
        <p class="auth-toggle">已有账号？<a id="toLogin" href="#">去登录</a></p>
      </form>

      <div id="authError" class="auth-error" hidden></div>
    </div>
  </div>

  <!-- 主应用 -->
  <div id="appView" hidden>
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">🚀</span>
        <div class="brand-text">
          <h1>Web 应用导航</h1>
          <p id="appCount">0 个应用</p>
        </div>
      </div>

      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="搜索应用名称或网址…" autocomplete="off" />
      </div>

      <div class="topbar-actions">
        <button id="userAvatarBtn" class="avatar-btn" title="个人资料">
          <span id="userAvatar" class="avatar"></span>
        </button>
        <span id="userName" class="user-name"></span>
        <button id="importBtn" class="btn ghost" title="从 JSON 文件导入">导入</button>
        <button id="exportBtn" class="btn ghost" title="导出为 JSON 备份">导出</button>
        <button id="themeBtn" class="btn ghost" title="切换深色/浅色">🌓</button>
        <button id="addBtn" class="btn primary">＋ 添加应用</button>
        <button id="chatBtn" class="btn ghost" title="P2P 聊天">💬 聊天<span id="chatUnreadBadge" class="nav-badge" hidden></span></button>
        <button id="logoutBtn" class="btn ghost">登出</button>
        <input id="importFile" type="file" accept="application/json" hidden />
      </div>
    </header>

    <nav class="filters" id="categoryFilters"></nav>

    <main class="content">
      <section id="appGrid" class="grid" aria-live="polite"></section>
      <div id="emptyState" class="empty-state" hidden>
        <div class="empty-emoji">🗂️</div>
        <h2>还没有应用</h2>
        <p>点击右上角「＋ 添加应用」开始收集你的常用网站。</p>
      </div>
    </main>

    <!-- 添加 / 编辑 弹窗 -->
    <div id="modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">添加应用</h2>
        <form id="appForm">
          <label class="field">
            <span>名称 <em>*</em></span>
            <input id="fName" name="name" type="text" required placeholder="例如：Gmail" />
          </label>

          <label class="field">
            <span>网址 <em>*</em></span>
            <input id="fUrl" name="url" type="url" required placeholder="https://mail.google.com" />
          </label>

          <label class="field">
            <span>分类</span>
            <input id="fCategory" name="category" type="text" list="categoryList" placeholder="工作 / 工具 / 娱乐" />
            <datalist id="categoryList"></datalist>
          </label>

          <label class="field">
            <span>图标（Emoji 或 favicon 链接）</span>
            <div class="icon-input-row">
              <input id="fEmoji" name="emoji" type="text" placeholder="🌟 或 https://…/favicon.ico" autocomplete="off" />
              <button type="button" id="fEmojiAuto" class="btn ghost small" title="使用网站默认 favicon">📎</button>
              <span class="icon-preview" id="iconPreview" aria-hidden="true"></span>
            </div>
          </label>

          <label class="field">
            <span>主题色</span>
            <div class="color-row" id="colorRow"></div>
          </label>

          <label class="field">
            <span>打开方式</span>
            <select id="fOpenMode">
              <option value="new">新标签页打开</option>
              <option value="self">当前窗口打开</option>
              <option value="iframe">内嵌窗口（iframe）打开</option>
            </select>
          </label>

          <div class="modal-actions">
            <button type="button" class="btn ghost" data-close>取消</button>
            <button type="submit" class="btn primary" id="saveBtn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <!-- 个人资料 / 头像 弹窗 -->
    <div id="profileModal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
        <h2 id="profileTitle">个人资料</h2>
        <label class="field">
          <span>头像（Emoji 或图片链接）</span>
          <div class="icon-input-row">
            <input id="pAvatar" type="text" placeholder="🌟 或 https://…/avatar.png" autocomplete="off" />
            <span class="icon-preview" id="avatarPreview" aria-hidden="true"></span>
          </div>
        </label>
        <label class="field">
          <span>用户名</span>
          <div id="profileUsername" class="profile-username"></div>
        </label>
      <div class="modal-actions">
        <button type="button" class="btn ghost" data-close>取消</button>
        <button type="button" class="btn primary" id="saveAvatar">保存</button>
      </div>
    </div>
  </div>

  <!-- 创建群聊 -->
  <div id="groupModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="groupModalTitle">
      <h2 id="groupModalTitle">创建群聊</h2>
      <label class="field">
        <span>群名称 <em>*</em></span>
        <input id="groupNameInput" type="text" maxlength="32" placeholder="例如：项目组 / 家人们" />
      </label>
      <div class="field">
        <span>选择成员（从好友中）</span>
        <div id="groupMemberPicker" class="member-picker"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn ghost" data-close>取消</button>
        <button type="button" class="btn primary" id="groupCreateConfirm">创建</button>
      </div>
    </div>
  </div>

  <!-- 添加群成员 -->
  <div id="groupAddModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="groupAddTitle">
      <h2 id="groupAddTitle">添加成员</h2>
      <div class="field">
        <span>选择好友加入群聊</span>
        <div id="groupAddPicker" class="member-picker"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn ghost" data-close>取消</button>
      </div>
    </div>
  </div>

  <!-- 内嵌 iframe 查看器（多页面常驻，最小化收纳到 dock）-->
  <div id="iframeDock" class="iframe-dock" hidden></div>

  <!-- 好友聊天抽屉 -->
  <div id="chatPanel" class="chat-panel" hidden>
    <div class="chat-resizer" id="chatResizer" title="拖动调整宽度"></div>
    <aside class="chat-sidebar">
      <div class="chat-sidebar-head">
        <div class="chat-title">聊天</div>
        <button id="chatClose" class="chat-x" title="关闭">✕</button>
      </div>

      <!-- Tab 栏：会话 / 好友 / 群组 -->
      <div class="chat-tabs">
        <button class="chat-tab active" data-tab="conversations">💬 会话<span id="tabConvBadge" class="tab-badge" hidden></span></button>
        <button class="chat-tab" data-tab="friends">👤 好友<span id="tabFriendBadge" class="tab-badge" hidden></span></button>
        <button class="chat-tab" data-tab="groups">👥 群组</button>
      </div>

      <!-- 会话面板：统一展示 私聊 + 群聊，按最近活动排序，可关闭 -->
      <div class="tab-panel" data-panel="conversations">
        <div id="convList" class="conv-list"></div>
        <div id="convEmpty" class="friend-empty" hidden>还没有会话，去「好友」或「群组」开始聊天吧</div>
      </div>

      <!-- 好友面板：添加好友 / 好友请求 / 好友列表 -->
      <div class="tab-panel" data-panel="friends" hidden>
        <div class="friend-add">
          <input id="friendSearch" type="text" placeholder="输入用户名添加好友" maxlength="32" autocomplete="off" />
          <button id="friendAdd" class="btn primary">添加</button>
        </div>
        <div id="friendRequests" class="friend-requests" hidden></div>
        <div id="friendList" class="friend-list"></div>
        <div id="friendEmpty" class="friend-empty">还没有好友，添加好友后即可开始聊天</div>
      </div>

      <!-- 群组面板：创建群聊 / 群聊列表 -->
      <div class="tab-panel" data-panel="groups" hidden>
        <div class="group-head">
          <span class="group-title">👥 群聊</span>
          <button id="groupCreateBtn" class="btn ghost small" title="创建群聊">＋ 创建</button>
        </div>
        <div id="groupList" class="group-list"></div>
        <div id="groupEmpty" class="friend-empty" hidden>还没有群聊，点「＋ 创建」开始</div>
      </div>
      <div class="sidebar-resizer" id="sidebarResizer" title="拖动调整列表宽度"></div>
    </aside>
    <section class="chat-main">
      <!-- 聊天视图 -->
      <div id="chatView">
        <div class="chat-header">
          <span id="chatPeerAvatar" class="avatar sm"></span>
          <div class="chat-title" id="chatPeerName">选择一个好友开始聊天</div>
          <div class="chat-status" id="chatStatus">未连接</div>
          <div id="chatGroupActions" class="chat-group-actions" hidden>
            <button id="groupAddMember" class="btn ghost small" title="添加成员">＋成员</button>
            <button id="groupLeave" class="btn ghost small" title="退出群聊">退出</button>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-row">
          <textarea id="chatInput" rows="1" placeholder="输入消息…（Enter 发送，Shift+Enter 换行）"
                    disabled></textarea>
          <button id="chatSend" class="btn primary" disabled>发送</button>
        </div>
      </div>

      <!-- 好友设置（资料）视图：点击好友列表项时显示 -->
      <div id="friendView" class="detail-view" hidden>
        <div class="detail-head">
          <span id="friendDetailAvatar" class="avatar lg"></span>
          <div class="detail-name" id="friendDetailName"></div>
          <div class="detail-sub" id="friendDetailStatus"></div>
        </div>
        <div class="detail-actions">
          <button id="friendMessageBtn" class="btn primary">发消息</button>
          <button id="friendRemoveBtn" class="btn ghost danger">移除好友</button>
        </div>
      </div>

      <!-- 群组设置（资料）视图：点击群组列表项时显示 -->
      <div id="groupView" class="detail-view" hidden>
        <div class="detail-head">
          <span id="groupDetailAvatar" class="avatar lg"></span>
          <div class="detail-name-row">
            <div class="detail-name" id="groupDetailName"></div>
            <button id="groupRenameBtn" class="icon-edit" hidden title="修改群名称">✎</button>
          </div>
          <input id="groupNameEdit" class="detail-name-edit" maxlength="64" hidden
                 placeholder="输入新群名称，回车保存" />
          <div class="detail-sub" id="groupDetailMeta"></div>
        </div>
        <div class="detail-section-title">群成员</div>
        <div id="groupDetailMembers" class="member-list"></div>
        <div class="detail-actions">
          <button id="groupMessageBtn" class="btn primary">发消息</button>
          <button id="groupAddMemberBtn2" class="btn ghost">＋添加成员</button>
          <button id="groupLeaveBtn2" class="btn ghost danger">退出群聊</button>
        </div>
      </div>
    </section>
  </div>

  <script src="app.js?v=59"></script>
</body>
</html>
